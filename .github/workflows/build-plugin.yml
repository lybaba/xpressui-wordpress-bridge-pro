name: Build WordPress Plugin PRO

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract plugin version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Read xpressui version
        id: xpressui
        run: echo "version=$(cat .xpressui-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@lybaba"

      - name: Wait for @lybaba/xpressui@${{ steps.xpressui.outputs.version }} on GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          XPRESSUI_VERSION: ${{ steps.xpressui.outputs.version }}
        run: |
          echo "Waiting for @lybaba/xpressui@${XPRESSUI_VERSION} to be available on GitHub Packages..."
          for i in $(seq 1 20); do
            if npm view @lybaba/xpressui@${XPRESSUI_VERSION} version 2>/dev/null | grep -qF "${XPRESSUI_VERSION}"; then
              echo "Package @lybaba/xpressui@${XPRESSUI_VERSION} is available."
              break
            fi
            echo "Attempt $i/20 — not available yet, retrying in 30s..."
            sleep 30
          done
          if ! npm view @lybaba/xpressui@${XPRESSUI_VERSION} version 2>/dev/null | grep -qF "${XPRESSUI_VERSION}"; then
            echo "ERROR: @lybaba/xpressui@${XPRESSUI_VERSION} did not appear after 10 minutes."
            exit 1
          fi

      - name: Fetch xpressui runtime
        run: |
          npm install @lybaba/xpressui@${{ steps.xpressui.outputs.version }}
          mkdir -p runtime
          cp node_modules/@lybaba/xpressui/dist/xpressui-${{ steps.xpressui.outputs.version }}.umd.js runtime/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build plugin ZIP
        run: |
          ZIP_NAME="xpressui-wordpress-bridge-pro-${{ steps.version.outputs.version }}.zip"
          OUTPUT_PATH="$(bash scripts/build-package.sh "$ZIP_NAME")"
          cp "$OUTPUT_PATH" "$ZIP_NAME"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
